<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cat Monitor</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</head>
<body>

<!-- ── App shell ── -->
<div x-data="{ view: 'feed' }" @open-detail.window="view = 'detail'" @close-detail.window="view = 'feed'">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-title" x-text="view === 'status' ? 'Status' : '🐱 Cat Monitor'"></div>
    <div>
      <button
        class="icon-btn"
        :aria-label="view === 'status' ? 'Back to feed' : 'System status'"
        @click="view = view === 'status' ? 'feed' : 'status'"
        x-show="view !== 'detail'"
      >
        <span x-text="view === 'status' ? '←' : '⚡'"></span>
      </button>
    </div>
  </header>

  <main>

    <!-- ── Feed ── -->
    <div x-data="feed" x-show="view === 'feed'" x-init="init()" @vue:destroy="destroy()">
      <p class="status-banner" :class="{ error: error }" x-text="statusText"></p>

      <div x-show="loading" class="spinner"></div>

      <div x-show="!loading && events.length === 0 && !error" class="empty-state">
        <div class="empty-state__icon">🐱</div>
        <p class="empty-state__text">No events yet.<br>Photos will appear once cameras start capturing.</p>
      </div>

      <ul class="feed" x-show="!loading && events.length > 0" role="list">
        <template x-for="event in events" :key="event.id">
          <li class="event-card" role="listitem" tabindex="0"
              @click="openDetail(event)"
              @keydown.enter="openDetail(event)">
            <img
              class="event-card__img"
              :src="imgSrc(event)"
              :alt="label(event)"
              loading="lazy"
            >
            <div class="event-card__body">
              <p class="event-card__label" :class="{ 'confidence-low': !confident(event) }" x-text="label(event)"></p>
              <p class="event-card__meta" x-text="timestamp(event)"></p>
            </div>
          </li>
        </template>
      </ul>
    </div>

    <!-- ── Detail ── -->
    <div x-data="detail" x-show="view === 'detail'"
         @open-detail.window="open($event.detail.event)">
      <button class="back-btn" @click="close()">← Back</button>
      <div class="detail" x-show="event">
        <img class="detail__img" :src="imgSrc" :alt="label" loading="lazy">
        <div class="detail__body">
          <h1 class="detail__label" :class="{ 'confidence-low': !confident }" x-text="label"></h1>
          <p class="detail__analysis" x-text="analysisText"></p>
          <div class="detail__meta">
            <span x-text="'Camera: ' + cameraName"></span>
            <span x-text="'Captured: ' + timestamp"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Status ── -->
    <div x-data="status" x-show="view === 'status'" x-init="init()" @vue:destroy="destroy()">
      <div x-show="loading" class="spinner"></div>

      <div x-show="!loading" class="status-screen">

        <div class="status-card">
          <p class="status-card__title">Server</p>
          <div class="status-row">
            <span>Uptime</span>
            <span class="status-val" x-text="uptimeText"></span>
          </div>
          <div class="status-row">
            <span>Last event</span>
            <span class="status-val" x-text="lastEventText"></span>
          </div>
        </div>

        <div class="status-card">
          <p class="status-card__title">Cameras</p>
          <div x-show="cameras.length === 0" class="status-row">
            <span style="color: var(--text-muted)">No cameras registered</span>
          </div>
          <template x-for="cam in cameras" :key="cam.id">
            <div class="status-row">
              <span>
                <span class="status-dot" :class="{ offline: !isOnline(cam) }"></span>
                <span x-text="cam.name"></span>
              </span>
              <span class="status-val" x-text="cameraLastSeen(cam)"></span>
            </div>
          </template>
        </div>

        <p x-show="error" class="status-banner error" x-text="error"></p>
      </div>
    </div>

  </main>
</div>

</body>
</html>
